<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOWLATMESBAH | Creative Agency</title>
    <!-- لود کردن آیکون‌ها و فونت‌های پایه -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050505;
            --brand-color: #053827; /* همان سبز عمیق کارت ویزیت شما */
            --text-main: #ffffff;
            --text-secondary: #888888;
            --transition: 0.4s ease-in-out;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* بخش ناوبری (بالای صفحه) */
        nav {
            padding: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(5,5,5,0.8), transparent);
        }

        .logo { 
            font-size: 1.1rem; 
            font-weight: 800; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            color: var(--text-main);
            border-left: 3px solid var(--brand-color);
            padding-left: 15px;
        }

        /* بخش خوش‌آمدگویی (Hero) */
        #hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #0a1f18 0%, #050505 100%);
        }

        #hero h1 { 
            font-size: clamp(2.5rem, 10vw, 5rem); 
            margin: 0; 
            font-weight: 900; 
            letter-spacing: -1px;
            line-height: 1;
        }

        #hero p { 
            color: var(--text-secondary); 
            font-size: 1rem; 
            margin-top: 1.5rem; 
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--brand-color);
            text-transform: uppercase;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* بخش ویدیو / شو-ریل */
        #showreel { padding: 8rem 2rem; text-align: center; }
        .section-title {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: var(--brand-color);
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        .video-container {
            max-width: 1100px;
            margin: 0 auto;
            aspect-ratio: 16/9;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .video-container::after {
            content: 'COMING SOON';
            letter-spacing: 5px;
            color: #222;
        }

        /* بخش پروژه‌ها (گرید) */
        #projects { padding: 5rem 2rem; background-color: #030303; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .project-card {
            height: 450px;
            background: #080808;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2.5rem;
            border: 1px solid #111;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: white;
        }

        .project-card:hover { 
            border-color: var(--brand-color); 
            transform: translateY(-10px);
            background: #0a1411;
        }

        .project-card h3 { 
            margin: 0; 
            font-size: 1.8rem; 
            font-weight: 700;
            z-index: 2;
        }

        .project-card p { 
            color: var(--text-secondary); 
            font-size: 0.9rem; 
            margin-top: 10px;
            z-index: 2;
        }

        /* بخش تماس */
        #contact { padding: 10rem 2rem; text-align: center; }
        .contact-mail {
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 200;
            transition: var(--transition);
        }
        .contact-mail:hover { color: var(--brand-color); }

        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-top: 4rem; 
        }

        .social-links a { 
            color: var(--text-secondary); 
            font-size: 1.5rem; 
            transition: var(--transition); 
        }

        .social-links a:hover { 
            color: var(--brand-color); 
            transform: scale(1.2);
        }

        footer { 
            padding: 4rem 2rem; 
            text-align: center; 
            font-size: 0.7rem; 
            color: #333; 
            letter-spacing: 2px;
        }

        /* استایل موبایل */
        @media (max-width: 768px) {
            nav { padding: 1.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">DOWLATMESBAH</div>
        <div style="font-size: 0.8rem; letter-spacing: 2px;">EST. 2024</div>
    </nav>

    <section id="hero">
        <p>Advertising Agency</p>
        <h1>DOWLATMESBAH</h1>
        <div class="scroll-indicator">Explore</div>
    </section>

    <section id="showreel">
        <div class="section-title">Showreel</div>
        <div class="video-container">
            <!-- ویدیوی شما بعداً اینجا قرار می‌گیرد -->
        </div>
    </section>

    <section id="projects">
        <div class="section-title">Selected Works</div>
        <div class="grid">
            <div class="project-card">
                <h3>Automotive</h3>
                <p>تبلیغات و عکاسی حرفه‌ای خودرو</p>
            </div>
            <div class="project-card">
                <h3>Architecture</h3>
                <p>نمایش جزئیات و شکوه معماری</p>
            </div>
            <div class="project-card">
                <h3>Product</h3>
                <p>معرفی محصولات با استانداردهای جهانی</p>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="section-title">Get in Touch</div>
        <a href="mailto:info@yourdomain.com" class="contact-mail">Let's Create Together</a>
        <div class="social-links">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-solid fa-paper-plane"></i></a>
        </div>
    </section>

    <footer>
        &copy; 2026 DOWLATMESBAH. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
