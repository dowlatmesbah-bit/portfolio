<!DOCTYPE html>
<html lang="fa" dir="rtl">

<meta charset="UTF-8">

<style>

:root{
--brand:#053827;
--brand2:#0b5c43;
--bg:#050505;
--text:#ffffff;
--muted:#aaaaaa;
}

*{box-sizing:border-box}

html{scroll-behavior:smooth}

body{
margin:0;
font-family:Tahoma,sans-serif;
color:var(--text);
background:var(--bg);
overflow-x:hidden;
}

/* cinematic background */

body::before{
content:"";
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,var(--brand),transparent 60%);
top:-200px;
right:-200px;
opacity:.25;
filter:blur(120px);
animation:glowMove 12s infinite alternate;
z-index:-1;
}

@keyframes glowMove{
from{transform:translate(0,0)}
to{transform:translate(-150px,120px)}
}

/* nav */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.nav-logo{
height:36px;
opacity:0;
animation:logoNav 1s forwards;
animation-delay:3s;
}

@keyframes logoNav{
to{opacity:1}
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
opacity:.8;
}

/* hero */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

/* center logo animation */

.center-logo{
width:260px;
opacity:0;
animation:centerAnim 3.2s forwards;
}

@keyframes centerAnim{

0%{
opacity:0;
transform:scale(.9) translateY(40px);
}

30%{
opacity:1;
transform:scale(1);
}

70%{
opacity:1;
transform:scale(.6) translateY(-120px);
}

100%{
opacity:0;
transform:scale(.4) translateY(-200px);
}

}

/* text */

h1{
font-size:46px;
letter-spacing:4px;
margin:10px 0;
opacity:0;
animation:fadeUp 1.5s forwards;
animation-delay:3s;
}

.subtitle{
color:var(--muted);
opacity:0;
animation:fadeUp 1.5s forwards;
animation-delay:3.8s;
}

.btn{
display:inline-block;
margin-top:28px;
padding:14px 36px;
background:var(--brand);
color:white;
text-decoration:none;
border-radius:8px;
opacity:0;
animation:fadeUp 1.5s forwards;
animation-delay:4.5s;
transition:.3s;
}

.btn:hover{
background:var(--brand2);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* gallery */

.gallery{
padding:100px 20px;
max-width:1200px;
margin:auto;
}

.gallery h2{
text-align:center;
margin-bottom:50px;
letter-spacing:2px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
position:relative;
overflow:hidden;
border-radius:12px;
}

.card img, .card video{
width:100%;
height:100%;
object-fit:cover;
display:block;
transition:transform .4s;
}

.card:hover img{
transform:scale(1.05);
}

/* contact */

.contact{
text-align:center;
padding:90px 20px;
}

.icons i{
font-size:22px;
margin:12px;
color:white;
}

/* footer */

footer{
text-align:center;
padding:40px;
font-size:13px;
opacity:.6;
}

</style>
</head>
