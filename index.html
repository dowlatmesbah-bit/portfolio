<!DOCTYPE html>
<html lang="fa" dir="rtl">

<title>DOWLATMESBAH</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--brand:#053827;
--bg:#050505;
--text:#ffffff;
--sub:#888;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Segoe UI, sans-serif;
overflow-x:hidden;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 40px;
position:fixed;
width:100%;
box-sizing:border-box;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
}

.logo{
font-weight:800;
letter-spacing:4px;
border-left:3px solid var(--brand);
padding-left:12px;
}

#hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle,#0b2018,#050505);
}

#hero h1{
font-size:60px;
margin:0;
letter-spacing:2px;
}

#hero p{
color:var(--sub);
letter-spacing:3px;
margin-top:20px;
}

.section-title{
text-align:center;
letter-spacing:4px;
color:var(--brand);
margin-bottom:50px;
}

#showreel{
padding:120px 20px;
text-align:center;
}

.video{
max-width:1000px;
margin:auto;
aspect-ratio:16/9;
background:#0a0a0a;
border:1px solid #111;
display:flex;
align-items:center;
justify-content:center;
color:#222;
letter-spacing:5px;
}

#projects{
padding:100px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
max-width:900px;
margin:auto;
}

.card{
height:300px;
background:#080808;
border:1px solid #111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-decoration:none;
color:white;
transition:.4s;
}

.card:hover{
border-color:var(--brand);
transform:translateY(-10px);
background:#0b1713;
}

.card h3{
font-size:28px;
margin:0;
}

.card p{
color:var(--sub);
margin-top:10px;
}

#contact{
padding:120px 20px;
text-align:center;
}

.mail{
font-size:30px;
text-decoration:none;
color:white;
}

.mail:hover{
color:var(--brand);
}

.social{
margin-top:40px;
display:flex;
justify-content:center;
gap:40px;
}

.social a{
font-size:26px;
color:#777;
transition:.3s;
}

.social a:hover{
color:var(--brand);
transform:scale(1.2);
}

footer{
text-align:center;
padding:60px 20px;
color:#333;
font-size:12px;
letter-spacing:2px;
}

@media(max-width:768px){

#hero h1{
font-size:38px;
}

.mail{
font-size:22px;
}

}

</style>

</head>

<body>

<p>Portfolio</p>

</a>

<p>Selected Works</p>

</a>

</div>

</section>

</a>

<a href="mailto:dowlatmesbah@gmail.com">

</a>

</div>

</section>


<footer>

</footer>


</body>
</html>
