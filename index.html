<style>

body{
margin:0;
font-family:Tahoma, sans-serif;
background:#0f0f0f;
color:white;
text-align:center;
overflow-x:hidden;
}

/* NAVBAR */

nav{
background:#000;
padding:20px;
position:fixed;
width:100%;
top:0;
z-index:1000;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:14px;
opacity:0.8;
}

/* HERO */

.hero{
padding-top:170px;
padding-bottom:120px;
}

/* LOGO ANIMATION */

.logo{
width:200px;
opacity:0;
animation:logoFade 2s ease forwards;
}

@keyframes logoFade{
0%{
opacity:0;
transform:translateY(30px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* NAME */

.hero h1{
font-size:42px;
letter-spacing:4px;
margin-top:30px;
opacity:0;
animation:textFade 2s ease forwards;
animation-delay:1.5s;
}

/* SUBTITLE */

.hero p{
opacity:0;
animation:textFade 2s ease forwards;
animation-delay:2.5s;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:30px;
padding:14px 35px;
background:#053827;
color:white;
text-decoration:none;
border-radius:5px;
opacity:0;
animation:textFade 2s ease forwards;
animation-delay:3.5s;
}

@keyframes textFade{
0%{
opacity:0;
transform:translateY(20px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* SECTIONS */

.section{
padding:90px 20px;
}

.section-title{
font-size:28px;
margin-bottom:50px;
letter-spacing:2px;
}

/* CARD */

.card{
display:inline-block;
padding:30px 60px;
background:#1a1a1a;
border-radius:8px;
text-decoration:none;
color:white;
transition:0.3s;
}

.card:hover{
background:#053827;
}

/* CONTACT */

.contact i{
font-size:22px;
margin:15px;
color:white;
}

/* FOOTER */

footer{
margin-top:80px;
padding:40px;
opacity:0.6;
font-size:13px;
}

</style>

</head>
